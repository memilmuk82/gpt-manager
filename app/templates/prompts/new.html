{% extends "base.html" %}

{% block title %}새 프롬프트 점검 - {{ config.get("APP_TITLE", "ChatGPT Pro 5X 공동 사용 지원 시스템") }}{% endblock %}

{% block content %}
  <section class="mx-auto max-w-4xl space-y-6">
    <div class="rounded-2xl border border-slate-200 bg-white p-5 shadow-sm">
      <p class="text-sm font-semibold text-slate-500">PROMPT REVIEWS</p>
      <h1 class="mt-2 text-3xl font-extrabold text-slate-950">새 프롬프트 점검</h1>
      <p class="mt-3 text-sm leading-6 text-slate-600">Gemini API를 활용해 프롬프트의 명확성, 안전성, 수업 활용성을 점검합니다.</p>
    </div>

    <form class="space-y-5 rounded-2xl border border-slate-200 bg-white p-6 shadow-sm" method="post" action="{{ url_for('prompts.create') }}">
      <div>
        <label class="block text-sm font-semibold text-slate-700" for="review_goal">점검 목표</label>
        <input class="mt-2 w-full rounded-xl border border-slate-300 px-3 py-2.5 text-sm focus:border-slate-950 focus:outline-none focus:ring-1 focus:ring-slate-950" id="review_goal" name="review_goal" value="명확성, 안전성, 수업 활용성 개선">
      </div>
      <div>
        <label class="block text-sm font-semibold text-slate-700" for="source_prompt">원본 프롬프트</label>
        <textarea class="mt-2 min-h-64 w-full rounded-xl border border-slate-300 px-3 py-2.5 text-sm focus:border-slate-950 focus:outline-none focus:ring-1 focus:ring-slate-950" id="source_prompt" name="source_prompt" required></textarea>
      </div>
      <div class="rounded-2xl border border-amber-200 bg-amber-50 p-4 text-sm leading-6 text-amber-950">
        학생 개인정보, 평가 자료, 생활기록부 민감정보, 상담 내용, 비공개 업무자료는 입력하지 않습니다.
      </div>
      <button class="rounded-full bg-slate-950 px-5 py-2.5 text-sm font-semibold text-white hover:bg-slate-800" type="submit">점검 실행</button>
    </form>
  </section>
{% endblock %}
