{% extends "base.html" %}

{% block title %}새 사용 로그 - {{ config.get("APP_TITLE", "ChatGPT Pro 5X 공동 사용 지원 시스템") }}{% endblock %}

{% block content %}
  <section class="mx-auto max-w-3xl space-y-6">
    <div class="rounded-2xl border border-slate-200 bg-white p-5 shadow-sm">
      <p class="text-sm font-semibold text-slate-500">USAGE LOGS</p>
      <h1 class="mt-2 text-3xl font-extrabold text-slate-950">새 사용 로그</h1>
      <p class="mt-3 text-sm leading-6 text-slate-600">예약과 연결하거나, 예약 없이 AI 리소스만 선택해 기록할 수 있습니다.</p>
    </div>

    <form class="space-y-5 rounded-2xl border border-slate-200 bg-white p-6 shadow-sm" method="post" action="{{ url_for('logs.create') }}">
      <div>
        <label class="block text-sm font-semibold text-slate-700" for="reservation_id">연결 예약</label>
        <select class="mt-2 w-full rounded-xl border border-slate-300 px-3 py-2.5 text-sm" id="reservation_id" name="reservation_id">
          <option value="">선택 안 함</option>
          {% for reservation in reservations %}
            <option value="{{ reservation.id }}">{{ reservation.resource.name }} / {{ reservation.start_at.strftime("%Y-%m-%d %H:%M") }} / {{ reservation.purpose }}</option>
          {% endfor %}
        </select>
      </div>
      <div>
        <label class="block text-sm font-semibold text-slate-700" for="resource_id">AI 리소스</label>
        <select class="mt-2 w-full rounded-xl border border-slate-300 px-3 py-2.5 text-sm" id="resource_id" name="resource_id">
          <option value="">선택</option>
          {% for resource in resources %}
            <option value="{{ resource.id }}">{{ resource.name }} ({{ resource.provider }})</option>
          {% endfor %}
        </select>
      </div>
      <div>
        <label class="block text-sm font-semibold text-slate-700" for="work_type">작업 유형</label>
        <input class="mt-2 w-full rounded-xl border border-slate-300 px-3 py-2.5 text-sm" id="work_type" name="work_type" type="text" required>
      </div>
      <div>
        <label class="block text-sm font-semibold text-slate-700" for="summary">요약</label>
        <textarea class="mt-2 min-h-24 w-full rounded-xl border border-slate-300 px-3 py-2.5 text-sm" id="summary" name="summary" required></textarea>
      </div>
      <div>
        <label class="block text-sm font-semibold text-slate-700" for="prompt_text">프롬프트</label>
        <textarea class="mt-2 min-h-32 w-full rounded-xl border border-slate-300 px-3 py-2.5 text-sm" id="prompt_text" name="prompt_text"></textarea>
      </div>
      <div>
        <label class="block text-sm font-semibold text-slate-700" for="result_note">결과 메모</label>
        <textarea class="mt-2 min-h-24 w-full rounded-xl border border-slate-300 px-3 py-2.5 text-sm" id="result_note" name="result_note"></textarea>
      </div>
      <div class="rounded-2xl border border-amber-200 bg-amber-50 p-4 text-sm leading-6 text-amber-950">
        개인정보, 민감정보, 평가 보안 자료, 실제 학생 자료를 입력하지 않습니다.
      </div>
      <div class="flex gap-3">
        <button class="rounded-full bg-slate-950 px-5 py-2.5 text-sm font-semibold text-white hover:bg-slate-800" type="submit">로그 저장</button>
        <a class="rounded-full border border-slate-300 bg-white px-5 py-2.5 text-sm font-semibold text-slate-700 hover:bg-slate-50" href="{{ url_for('logs.index') }}">취소</a>
      </div>
    </form>
  </section>
{% endblock %}
