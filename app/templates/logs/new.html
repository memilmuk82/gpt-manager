{% extends "base.html" %}

{% block title %}New Usage Log - GPT Share Manager vNext{% endblock %}

{% block content %}
  <section class="mx-auto max-w-2xl space-y-6">
    <div>
      <p class="text-sm font-medium uppercase tracking-wide text-teal-700">Usage Logs</p>
      <h1 class="mt-2 text-3xl font-bold">새 사용 로그</h1>
      <p class="mt-3 text-zinc-600">예약과 연결하거나, 예약 없이 AI 리소스만 선택해 기록할 수 있습니다.</p>
    </div>

    <form class="space-y-5 rounded-md border border-zinc-200 bg-white p-6" method="post" action="{{ url_for('logs.create') }}">
      <div>
        <label class="block text-sm font-medium text-zinc-700" for="reservation_id">연결 예약</label>
        <select class="mt-2 w-full rounded-md border border-zinc-300 px-3 py-2" id="reservation_id" name="reservation_id">
          <option value="">선택 안 함</option>
          {% for reservation in reservations %}
            <option value="{{ reservation.id }}">{{ reservation.resource.name }} / {{ reservation.start_at.strftime("%Y-%m-%d %H:%M") }} / {{ reservation.purpose }}</option>
          {% endfor %}
        </select>
      </div>

      <div>
        <label class="block text-sm font-medium text-zinc-700" for="resource_id">AI 리소스</label>
        <select class="mt-2 w-full rounded-md border border-zinc-300 px-3 py-2" id="resource_id" name="resource_id">
          <option value="">선택</option>
          {% for resource in resources %}
            <option value="{{ resource.id }}">{{ resource.name }} ({{ resource.provider }})</option>
          {% endfor %}
        </select>
      </div>

      <div>
        <label class="block text-sm font-medium text-zinc-700" for="work_type">작업 유형</label>
        <input class="mt-2 w-full rounded-md border border-zinc-300 px-3 py-2" id="work_type" name="work_type" type="text" required>
      </div>

      <div>
        <label class="block text-sm font-medium text-zinc-700" for="summary">요약</label>
        <textarea class="mt-2 min-h-24 w-full rounded-md border border-zinc-300 px-3 py-2" id="summary" name="summary" required></textarea>
      </div>

      <div>
        <label class="block text-sm font-medium text-zinc-700" for="prompt_text">프롬프트</label>
        <textarea class="mt-2 min-h-32 w-full rounded-md border border-zinc-300 px-3 py-2" id="prompt_text" name="prompt_text"></textarea>
      </div>

      <div>
        <label class="block text-sm font-medium text-zinc-700" for="result_note">결과 메모</label>
        <textarea class="mt-2 min-h-24 w-full rounded-md border border-zinc-300 px-3 py-2" id="result_note" name="result_note"></textarea>
      </div>

      <div class="flex gap-3">
        <button class="rounded-md bg-teal-700 px-4 py-2 text-sm font-medium text-white hover:bg-teal-800" type="submit">로그 저장</button>
        <a class="rounded-md border border-zinc-300 px-4 py-2 text-sm font-medium text-zinc-700 hover:bg-zinc-100" href="{{ url_for('logs.index') }}">취소</a>
      </div>
    </form>
  </section>
{% endblock %}
