{% extends "base.html" %}

{% block title %}로그인 - GPT Share Manager vNext{% endblock %}

{% block content %}
  <section class="max-w-md space-y-6">
    <div>
      <h1 class="text-2xl font-bold">로그인</h1>
      <p class="mt-2 text-sm text-zinc-600">가입한 로컬 계정으로 로그인합니다.</p>
    </div>

    <form class="space-y-4" method="post" action="{{ url_for('auth.login_post', next=request.args.get('next')) }}">
      <label class="block text-sm font-medium">
        이메일
        <input class="mt-1 w-full rounded-md border border-zinc-300 px-3 py-2" name="email" type="email" required autocomplete="email">
      </label>
      <label class="block text-sm font-medium">
        비밀번호
        <input class="mt-1 w-full rounded-md border border-zinc-300 px-3 py-2" name="password" type="password" required autocomplete="current-password">
      </label>
      <button class="rounded-md bg-teal-700 px-4 py-2 text-sm font-medium text-white hover:bg-teal-800" type="submit">로그인</button>
    </form>
  </section>
{% endblock %}
