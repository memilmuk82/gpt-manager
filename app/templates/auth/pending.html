{% extends "base.html" %}

{% block title %}승인 대기 - GPT Share Manager vNext{% endblock %}

{% block content %}
  <section class="max-w-2xl space-y-6">
    <div>
      <p class="text-sm font-medium uppercase text-amber-700">Approval Pending</p>
      <h1 class="mt-2 text-3xl font-bold">관리자 승인 대기 중입니다.</h1>
      <p class="mt-3 text-zinc-600">
        senedu.kr 계정은 자동 승인되며, 그 외 Google 또는 로컬 이메일 계정은 관리자가 승인한 뒤 사용할 수 있습니다.
      </p>
    </div>
    <form method="post" action="{{ url_for('auth.logout') }}">
      <button class="rounded-md border border-zinc-300 px-4 py-2 text-sm font-medium text-zinc-700 hover:bg-zinc-100" type="submit">로그아웃</button>
    </form>
  </section>
{% endblock %}
