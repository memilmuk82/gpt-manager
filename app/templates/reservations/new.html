{% extends "base.html" %}

{% block title %}New Reservation - GPT Share Manager vNext{% endblock %}

{% block content %}
  <section class="mx-auto max-w-2xl space-y-6">
    <div>
      <p class="text-sm font-medium uppercase tracking-wide text-teal-700">Reservations</p>
      <h1 class="mt-2 text-3xl font-bold">새 예약</h1>
      <p class="mt-3 text-zinc-600">예약 시간은 같은 AI 리소스에서 서로 겹칠 수 없습니다.</p>
    </div>

    <form class="space-y-5 rounded-md border border-zinc-200 bg-white p-6" method="post" action="{{ url_for('reservations.create') }}">
      <div>
        <label class="block text-sm font-medium text-zinc-700" for="resource_id">AI 리소스</label>
        <select class="mt-2 w-full rounded-md border border-zinc-300 px-3 py-2" id="resource_id" name="resource_id" required>
          <option value="">선택</option>
          {% for resource in resources %}
            <option value="{{ resource.id }}">{{ resource.name }} ({{ resource.provider }})</option>
          {% endfor %}
        </select>
      </div>

      <div class="grid gap-4 sm:grid-cols-2">
        <div>
          <label class="block text-sm font-medium text-zinc-700" for="start_at">시작</label>
          <input class="mt-2 w-full rounded-md border border-zinc-300 px-3 py-2" id="start_at" name="start_at" type="datetime-local" required>
        </div>
        <div>
          <label class="block text-sm font-medium text-zinc-700" for="end_at">종료</label>
          <input class="mt-2 w-full rounded-md border border-zinc-300 px-3 py-2" id="end_at" name="end_at" type="datetime-local" required>
        </div>
      </div>

      <div>
        <label class="block text-sm font-medium text-zinc-700" for="purpose">목적</label>
        <input class="mt-2 w-full rounded-md border border-zinc-300 px-3 py-2" id="purpose" name="purpose" type="text" maxlength="255" required>
      </div>

      <div class="flex gap-3">
        <button class="rounded-md bg-teal-700 px-4 py-2 text-sm font-medium text-white hover:bg-teal-800" type="submit">예약 생성</button>
        <a class="rounded-md border border-zinc-300 px-4 py-2 text-sm font-medium text-zinc-700 hover:bg-zinc-100" href="{{ url_for('reservations.index') }}">취소</a>
      </div>
    </form>
  </section>
{% endblock %}
